<div class="login">
  <p-card styleClass="login__card">
    <ng-template pTemplate="header">
      <div class="login__hero">
        <span class="login__icon pi pi-graduation-cap" aria-hidden="true"></span>
        <div>
          <h1 class="login__title">Portal estudiantes</h1>
          <p class="login__lead">Inicie sesión para continuar</p>
        </div>
      </div>
    </ng-template>

    <form class="login__form" (ngSubmit)="iniciarSesion()">
      <label class="login__field">
        <span class="login__label">Usuario</span>
        <input
          pInputText
          name="nombreUsuario"
          [(ngModel)]="nombreUsuario"
          autocomplete="username"
          [disabled]="loading"
          class="w-full"
        />
      </label>
      <label class="login__field">
        <span class="login__label">Contraseña</span>
        <p-password
          [(ngModel)]="password"
          name="password"
          [feedback]="false"
          [toggleMask]="true"
          [disabled]="loading"
          styleClass="w-full"
          inputStyleClass="w-full"
          autocomplete="current-password"
        />
      </label>
      <p-button
        type="submit"
        label="Entrar"
        icon="pi pi-sign-in"
        styleClass="w-full"
        [loading]="loading"
        [disabled]="loading"
      />
    </form>
  </p-card>
</div>
