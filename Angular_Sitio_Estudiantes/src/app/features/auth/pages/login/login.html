<div class="login">
  <p-card styleClass="login__card">
    <ng-template pTemplate="header">
      <div class="login__hero">
        <span class="login__icon pi pi-graduation-cap" aria-hidden="true"></span>
        <div>
          <h1 class="login__title">Portal estudiantes</h1>
          <p class="login__lead">Inicie sesión para continuar</p>
        </div>
      </div>
    </ng-template>

    <form class="login__form" (ngSubmit)="iniciarSesion()">
      <label class="login__field">
        <span class="login__label">Usuario</span>
        <input
          pInputText
          name="nombreUsuario"
          [(ngModel)]="nombreUsuario"
          autocomplete="username"
          [disabled]="loading"
          class="w-full"
        />
      </label>
      <label class="login__field">
        <span class="login__label">Contraseña</span>
        <p-password
          [(ngModel)]="password"
          name="password"
          [feedback]="false"
          [toggleMask]="true"
          [disabled]="loading"
          styleClass="w-full"
          inputStyleClass="w-full"
          autocomplete="current-password"
        />
      </label>
      <p-button
        type="submit"
        label="Entrar"
        icon="pi pi-sign-in"
        styleClass="w-full"
        [loading]="loading"
        [disabled]="loading"
      />

      <aside class="login__enroll" aria-label="Registro e inscripción en línea">
        <div class="login__enroll-inner">
          <span class="login__enroll-icon pi pi-user-plus" aria-hidden="true"></span>
          <div class="login__enroll-copy">
            <p class="login__enroll-kicker">¿Aún no está registrado?</p>
            <p class="login__enroll-text">
              Use el <strong>registro en línea</strong> para crear su cuenta de estudiante, elegir un programa de créditos y vincular su expediente. Después podrá
              acceder al portal e inscribir sus materias.
            </p>
            <a routerLink="/registro" class="login__enroll-cta">
              Ir a registro e inscripción
              <span class="pi pi-arrow-right login__enroll-cta-icon" aria-hidden="true"></span>
            </a>
          </div>
        </div>
      </aside>
    </form>
  </p-card>
</div>
